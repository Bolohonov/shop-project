version: '3.8'

services:
  # ── Shop Backend ──────────────────────────────────────────
  shop-backend:
    build: ./shop-backend
    ports:
      - "8081:8081"
    environment:
      DB_HOST: shop-postgres
      DB_PORT: 5432
      DB_NAME: shop_db
      DB_USERNAME: shop_user
      DB_PASSWORD: shop_pass
      REDIS_HOST: shop-redis
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      FRONTEND_URL: http://localhost:5174
      JWT_SECRET: shop-dev-secret-change-me-at-least-32-characters-long!!
      MAIL_HOST: mailhog
      MAIL_PORT: 1025
      MAIL_USERNAME: ""
      MAIL_PASSWORD: ""
    depends_on:
      - shop-postgres
      - shop-redis
      - kafka

  # ── Shop Frontend ─────────────────────────────────────────
  shop-frontend:
    build: ./shop-frontend
    ports:
      - "5174:80"
    depends_on:
      - shop-backend

  # ── PostgreSQL (Shop DB) ──────────────────────────────────
  shop-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: shop_db
      POSTGRES_USER: shop_user
      POSTGRES_PASSWORD: shop_pass
    ports:
      - "5433:5432"
    volumes:
      - shop-pg-data:/var/lib/postgresql/data

  # ── Redis ─────────────────────────────────────────────────
  shop-redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"

  # ── Kafka (shared with CRM or standalone) ─────────────────
  kafka:
    image: bitnami/kafka:3.7
    ports:
      - "9092:9092"
    environment:
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: controller,broker
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka-data:/bitnami/kafka

  # ── Mailhog (dev email testing) ───────────────────────────
  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  shop-pg-data:
  kafka-data:
