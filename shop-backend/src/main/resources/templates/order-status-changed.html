<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body style="font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto; padding: 20px;">
<div style="background: #f8f9fa; border-radius: 8px; padding: 24px;">
    <h2 style="color: #1a1a2e; margin-top: 0;">Статус заказа изменён</h2>
    <p>Уважаемый(ая) <span th:text="${userName}">Покупатель</span>,</p>
    <p>Статус вашего заказа <strong th:text="${orderNumber}">SHOP-00001</strong> изменён:</p>
    <div style="background: #fff; border-radius: 6px; padding: 16px; margin: 16px 0; border-left: 4px solid #6366f1;">
        <p style="margin: 0;"><strong>Новый статус:</strong> <span th:text="${newStatus}">Отправлен</span></p>
        <p style="margin: 8px 0 0;" th:if="${comment}"><strong>Комментарий:</strong> <span th:text="${comment}"></span></p>
    </div>
    <p style="color: #666; font-size: 14px;">С уважением,<br/>Команда Online Shop</p>
</div>
</body>
</html>
