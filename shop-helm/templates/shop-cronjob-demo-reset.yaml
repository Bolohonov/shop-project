apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ .Release.Name }}-demo-reset
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Release.Name }}-demo-reset
spec:
  # Каждую ночь в 03:05 — чуть позже CRM (03:00) чтобы не конкурировали
  schedule: "5 3 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      activeDeadlineSeconds: 60
      backoffLimit: 0
      template:
        metadata:
          labels:
            app: {{ .Release.Name }}-demo-reset
        spec:
          restartPolicy: Never
          containers:
          - name: demo-reset
            image: curlimages/curl:8.7.1
            command:
              - sh
              - -c
              - |
                echo "Starting shop demo reset at $(date)"
                HTTP_CODE=$(curl -s -o /tmp/response.txt -w "%{http_code}" \
                  -X POST \
                  -H "X-Internal-Token: ${INTERNAL_TOKEN}" \
                  -H "Content-Type: application/json" \
                  --max-time 30 \
                  --retry 3 \
                  --retry-delay 5 \
                  "http://{{ .Release.Name }}-backend.{{ .Release.Namespace }}.svc.cluster.local:8081/api/v1/internal/demo/reset")
                echo "Response: $(cat /tmp/response.txt)"
                echo "HTTP status: $HTTP_CODE"
                if [ "$HTTP_CODE" = "200" ]; then
                  echo "Shop demo reset completed successfully"
                  exit 0
                else
                  echo "Shop demo reset FAILED with HTTP $HTTP_CODE"
                  exit 1
                fi
            env:
            - name: INTERNAL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secrets
                  key: internal-token
            resources:
              requests:
                cpu: "10m"
                memory: "16Mi"
              limits:
                cpu: "50m"
                memory: "32Mi"
