apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-secrets
  namespace: {{ .Release.Namespace }}
type: Opaque
stringData:
  db-password: {{ .Values.postgresql.password | quote }}
  jwt-secret: {{ .Values.backend.env.JWT_SECRET | quote }}
  internal-token: {{ .Values.backend.env.INTERNAL_TOKEN | default "" | quote }}
  redis-password: {{ .Values.redis.password | quote }}
  mail-password: {{ .Values.backend.env.MAIL_PASSWORD | quote }}
