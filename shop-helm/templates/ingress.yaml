{{- if .Values.ingress.enabled }}
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: {{ .Release.Name }}-ingressroute
  namespace: {{ .Release.Namespace }}
spec:
  entryPoints:
    - web
  routes:
    # SSE: отдельный роут без буферизации (должен быть выше общего /api)
    - match: Host(`{{ .Values.ingress.host }}`) && PathPrefix(`{{ .Values.ingress.basePath }}/api/v1/events`)
      kind: Rule
      middlewares:
        - name: {{ .Release.Name }}-strip
        - name: {{ .Release.Name }}-sse
      services:
        - name: {{ .Release.Name }}-backend
          port: {{ .Values.backend.service.port }}

    # Backend API: /shop/api/v1/* -> strip /shop -> backend gets /api/v1/*
    - match: Host(`{{ .Values.ingress.host }}`) && PathPrefix(`{{ .Values.ingress.basePath }}/api`)
      kind: Rule
      middlewares:
        - name: {{ .Release.Name }}-strip
      services:
        - name: {{ .Release.Name }}-backend
          port: {{ .Values.backend.service.port }}

    # Frontend: /shop/* -> frontend serves SPA
    - match: Host(`{{ .Values.ingress.host }}`) && PathPrefix(`{{ .Values.ingress.basePath }}`)
      kind: Rule
      services:
        - name: {{ .Release.Name }}-frontend
          port: 80

  {{- if .Values.ingress.tls.enabled }}
  tls:
    secretName: {{ .Values.ingress.tls.secretName }}
  {{- end }}
{{- end }}