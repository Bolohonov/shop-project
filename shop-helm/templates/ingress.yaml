{{- if .Values.ingress.enabled }}
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: {{ .Release.Name }}-ingressroute
  namespace: {{ .Release.Namespace }}
spec:
  entryPoints:
    - web
  routes:
    # Backend API: /shop/api/v1/* -> strip /shop -> backend gets /api/v1/*
    - match: Host(`{{ .Values.ingress.host }}`) && PathPrefix(`{{ .Values.ingress.basePath }}/api`)
      kind: Rule
      middlewares:
        - name: {{ .Release.Name }}-strip
      services:
        - name: {{ .Release.Name }}-backend
          port: {{ .Values.backend.service.port }}

    # SSE events: /shop/api/v1/events/* -> same as API
    # (covered by the /shop/api rule above)

    # Frontend: /shop/* -> strip /shop -> frontend gets /*
    - match: Host(`{{ .Values.ingress.host }}`) && PathPrefix(`{{ .Values.ingress.basePath }}`)
      kind: Rule
      services:
        - name: {{ .Release.Name }}-frontend
          port: 80

  {{- if .Values.ingress.tls.enabled }}
  tls:
    secretName: {{ .Values.ingress.tls.secretName }}
  {{- end }}
{{- end }}
